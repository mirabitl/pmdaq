<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>PMDAQ Dashboard</title>

  <link rel="stylesheet" href="css/styles.css">
  <script src="vendor/mqtt.min.js"></script>
</head>

<body>
<div class="card">
  <h3>Session</h3>

  <input id="global_name" placeholder="name (ex: tel_cms)">
  <input id="global_version" placeholder="version (ex: 4)">

  <button onclick="applyConfig()">Apply</button>
</div>
<div class="tabs">
  <div class="tab active" onclick="openTab('mqtt')">MQTT</div>
  <div class="tab" onclick="openTab('versions')">Versions</div>
  <div class="tab" onclick="openTab('fsm')">FSM</div>
</div>

<div id="mqtt" class="content active">
  <h2>MQTT Monitor</h2>
  <div id="mqttData"></div>
</div>

<div id="versions" class="content">
  <h2>Versions</h2>
  <div id="versionsUI"></div>
</div>

<div id="fsm" class="content">
  <h2>FSM</h2>
  <div id="fsmUI"></div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/mqtt.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
