<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>PMDAQ Dashboard</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
body { font-family: Arial; margin:0; background:#111; color:#eee; }
.tabs { display:flex; background:#222; }
.tab { padding:10px 20px; cursor:pointer; }
.tab.active { background:#444; }
.content { display:none; padding:20px; }
.content.active { display:block; }
.card { background:#1e1e1e; padding:10px; margin:10px 0; border-radius:8px; }
button { margin:5px; padding:6px 10px; }
input, textarea { width:100%; margin:5px 0; padding:6px; }
pre { background:#000; padding:10px; overflow:auto; }
.app { border:1px solid #333; margin:10px 0; padding:10px; }
.instance { border:1px dashed #444; margin:5px; padding:5px; }
.state { font-weight:bold; color:#6cf; }
</style>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="card">
  <h3>Session</h3>
  <input id="global_name" placeholder="name (tel_cms)">
  <input id="global_version" placeholder="version (4)">
  <button onclick="applyConfig()">Apply</button>
</div>

<div class="card">
  <h3>Run Control</h3>
  <h2> Transitions </h2>
  <div>State: <span id="rc_state">-</span></div>
  <div id="rc_buttons"></div>

  <h2> Commands </h2>

  <div style="margin-top:10px;">
    <button onclick="sendCommandGlobal('pause')">Pause</button>
    <button onclick="sendCommandGlobal('resume')">Resume</button>
    <button onclick="sendCommandGlobal('status')">Update Status</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="openTab('mqtt')">STATUS</div>
  <div class="tab" onclick="openTab('versions')">Session Managment</div>
  <div class="tab" onclick="openTab('fsm')">FSM & Commands</div>
</div>

<div id="mqtt" class="content active">

<h2>
  DAQ Status 
  (<span id="global_state">-</span>)
</h2>
  <!-- 🔥 NEW -->
  <div id="globalStatus"></div>

  <div id="mqttData"></div>
</div>
<div id="versions" class="content">
  <h2>Versions</h2>
  <button onclick="createApp()">Create</button>
  <button onclick="deleteApp()">Delete</button>
  <button onclick="restartApp()">Restart</button> 
  <textarea id="c_params">{}</textarea>
  <button onclick="configureApp()">Configure</button>
  <pre id="versions_output"></pre>
</div>

<div id="fsm" class="content">
  <h2>FSM</h2>
  <input id="t_transition" placeholder="transition">
  <button onclick="sendTransition()">Send</button>
  <input id="cmd_command" placeholder="command">
  <textarea id="cmd_params">{}</textarea>
  <button onclick="sendCommand()">Send</button>
  <pre id="fsm_output"></pre>
</div>

<script>
let STATE = {
  name: null,
  version: null,
  mqttClient: null,
  data: {},

  rc: {
    state: null,
    allowed: []
  },

  statusTimer: null
};

function isConfigured() {
  return STATE.name && STATE.version;
}

function applyConfig() {
  STATE.name = global_name.value;
  STATE.version = global_version.value;

  if (!isConfigured()) return alert("Missing config");

  connectMQTT();
}

// MQTT CONNECT
function connectMQTT() {
  if (STATE.mqttClient) STATE.mqttClient.end();

  STATE.data = {};

  const topic = `pmdaq/${STATE.name}/#`;

  const client = mqtt.connect('ws://lyoilcdaq01:8080');
  STATE.mqttClient = client;

  client.on('connect', () => {
    console.log("MQTT connected");
    client.subscribe(topic);
  });

  client.on('message', (topic, message) => {
  let payload;

  try {
    payload = JSON.parse(message.toString());
  } catch {
    // ⚠️ cas rc/state = "RUNNING" (non JSON)
    payload = message.toString();
  }

  parseTopic(topic, payload);
  renderMQTT();
});
}

// PARSE TOPIC → HIERARCHY
function parseTopic(topic, payload) {
  const parts = topic.split('/');

    // RC GLOBAL
    if (parts[2] === "rc") {
  const type = parts[3];

  if (type === "state") {
    STATE.rc.state = payload;  // string directe
  }

  if (type === "allowed") {
    // peut être string JSON ou déjà array
    if (typeof payload === "string") {
      try {
        STATE.rc.allowed = JSON.parse(payload);
      } catch {
        STATE.rc.allowed = [];
      }
    } else {
      STATE.rc.allowed = payload;
    }
  }

  console.log("RC UPDATE:", STATE.rc);

  updateRCDisplay();
  updateFSMButtons();
  manageAutoStatus();

  return;
}
 
  // APPS
  if (parts.length < 5) return;

  const app = parts[2];
  const instance = parts[3];
  const type = parts[4];

  if (!STATE.data[app]) STATE.data[app] = {};
  if (!STATE.data[app][instance]) STATE.data[app][instance] = {};

  STATE.data[app][instance][type] = payload;
}

function makeTable(obj) {
  let html = '<table border="1" style="border-collapse:collapse;">';
  html += '<tr>';
  Object.keys(obj).forEach(k => html += `<th>${k}</th>`);
  html += '</tr>';

  html += '<tr>';
  Object.values(obj).forEach(v => html += `<td>${v}</td>`);
  html += '</tr>';

  html += '</table>';
  return html;
}

function makeTableFromArray(arr) {
  if (!arr.length) return '';

  let html = '<table border="1" style="border-collapse:collapse;">';

  html += '<tr>';
  Object.keys(arr[0]).forEach(k => html += `<th>${k}</th>`);
  html += '</tr>';

  arr.forEach(row => {
    html += '<tr>';
    Object.values(row).forEach(v => html += `<td>${v}</td>`);
    html += '</tr>';
  });

  html += '</table>';
  return html;
}


function updateRCDisplay() {
  const state = (STATE.rc.state || "").trim().toUpperCase();

  // affichage simple
  const rcEl = document.getElementById('rc_state');
  if (rcEl) rcEl.innerText = state || "-";

  const globalEl = document.getElementById('global_state');
  if (!globalEl) return;

  globalEl.innerText = state || "-";

  // 🔥 reset propre
  globalEl.classList.remove(
    "state-running",
    "state-configured",
    "state-initialised",
    "state-error"
  );

  // 🔥 mapping robuste
  if (state === "RUNNING") {
    globalEl.classList.add("state-running");
  } else if (state === "CONFIGURED") {
    globalEl.classList.add("state-configured");
  } else if (state === "INITIALISED") {
    globalEl.classList.add("state-initialised");
  } else {
    globalEl.classList.add("state-error");
  }
  }
  
function updateFSMButtons() {
  const div = document.getElementById('rc_buttons');
  div.innerHTML = '';

  STATE.rc.allowed
    .filter(tr => !tr.startsWith("to_"))   // 🔥 filtre ici
    .forEach(tr => {
      const b = document.createElement('button');
      b.innerText = tr;
      b.onclick = () => sendTransitionRC(tr);
      div.appendChild(b);
    });
}
    



  async function sendTransitionRC(name) {
  if (!isConfigured()) return;

      // 1. demander commentaire
      if (name == "start")
      {
	  const r_comment = prompt(`Commentaire pour transition RC : ${name}`);

	  if (r_comment === null) return; // cancel popup

	  try {
	      // 2. envoyer commentaire
	      await api(
		  `/apps/${STATE.name}/versions/${STATE.version}/commands`,
		  'POST',
		  {
		      cmd: "set_comment",
		      params: { "comment":r_comment }
		  }
	      );
	  } catch (e) {
	      console.error("RC transition error", e);
	  }
      }
	      

    // 3. envoyer transition RC
    const res = await api(
      `/apps/${STATE.name}/versions/${STATE.version}/transitions`,
      'POST',
      { name }
    );

    console.log("RC transition OK:", name, res);

}
  

function renderStatus(app, data) {
  if (!data.status) return '';

  // -------- BUILDER --------
  if (data.status.answer) {
    let main = {...data.status.answer};
    delete main.difs;

    let html = '<h4>Builder</h4>';
    html += makeTable(main);

    if (data.status.answer.difs) {
      html += '<h5>DIFs</h5>';
      html += makeTableFromArray(data.status.answer.difs);
    }

    return html;
  }

  // -------- TRIGGER --------
  if (data.status.COUNTERS) {
    return `<h4>Trigger</h4>` + makeTable(data.status.COUNTERS);
  }

  // -------- PMR --------
  if (Array.isArray(data.status)) {
    return `<h4>PMR</h4>` + makeTableFromArray(data.status);
  }

  return `<pre>${JSON.stringify(data.status, null, 2)}</pre>`;
}
// RENDER HIERARCHICAL VIEW
function renderMQTT() {
  const container = document.getElementById('mqttData');
  container.innerHTML = '';

  Object.entries(STATE.data).forEach(([app, instances]) => {

    const appDiv = document.createElement('div');
    appDiv.className = 'app';
    appDiv.innerHTML = `<h3>${app}</h3>`;

    Object.entries(instances).forEach(([inst, data]) => {

      const instDiv = document.createElement('div');
      instDiv.className = 'instance';

      const state = data.state?.value || data.info?.STATE || "?";

      let html = `
        <div>
          Instance: ${inst} 
          <span class="state">${state}</span>
        </div>
      `;

      // -------- STATUS TABLE --------
      html += renderStatus(app, data);

      // -------- DETAILS JSON (debug) --------
      html += `
        <details>
          <summary>Raw JSON</summary>
          <pre>${JSON.stringify(data, null, 2)}</pre>
        </details>
      `;

      instDiv.innerHTML = html;
      appDiv.appendChild(instDiv);
    });

    container.appendChild(appDiv);
  });
}
// REST
const BASE = 'http://lyoilcdaq01:8000';

async function api(path, method='GET', body=null) {
  const res = await fetch(BASE + path, {
    method,
    headers: {'Content-Type':'application/json'},
    body: body ? JSON.stringify(body) : null
  });
  return await res.json();
}

async function createApp() {
  if (!isConfigured()) return;
  const res = await api('/apps/', 'POST', {name: STATE.name, version: STATE.version});
  versions_output.textContent = JSON.stringify(res, null, 2);
}

async function deleteApp() {
  if (!isConfigured()) return;
  const res = await api(`/apps/${STATE.name}/versions/${STATE.version}`, 'DELETE');
  versions_output.textContent = JSON.stringify(res, null, 2);
}

async function configureApp() {
  if (!isConfigured()) return;
  const res = await api(`/apps/${STATE.name}/versions/${STATE.version}/configure`, 'POST', {
    params: JSON.parse(c_params.value)
  });
  versions_output.textContent = JSON.stringify(res, null, 2);
}


function manageAutoStatus() {
    //const activeStates = ["INITIALISED", "CONFIGURED", "RUNNING"];
    const activeStates = ["RUNNING"];

  console.log("RC state:", STATE.rc.state);

  if (!activeStates.includes(STATE.rc.state)) {
    if (STATE.statusTimer) {
      clearInterval(STATE.statusTimer);
      STATE.statusTimer = null;
      console.log("Auto status STOPPED");
    }
    return;
  }

  if (STATE.statusTimer) return;

  console.log("Auto status STARTED");

  STATE.statusTimer = setInterval(async () => {
    if (!isConfigured()) return;

    console.log("Polling status...");

    try {
      const res = await api(
        `/apps/${STATE.name}/versions/${STATE.version}/commands`,
        'POST',
        { cmd: "status", params: {} }
      );

      console.log("Status OK");
      //renderStatusFromAPI(res);

    } catch (e) {
      console.error("Status polling error", e);
    }

  }, 10000);
}

function renderStatusFromAPI(res) {
  const container = document.getElementById('globalStatus');

  if (!res.result) return;

  let html = `<h2>GLOBAL STATUS (${STATE.rc.state})</h2>`;

  res.result.apps.forEach(app => {
    html += `<div class="app">`;
    html += `<h3>${app.name} (${app.state})</h3>`;

    // BUILDER
    if (app.status?.answer) {
      const main = {...app.status.answer};
      delete main.difs;

      html += makeTable(main);
      html += makeTableFromArray(app.status.answer.difs);
    }

    // TRIGGER
    else if (app.status?.COUNTERS) {
      html += makeTable(app.status.COUNTERS);
    }

    // PMR
    else if (Array.isArray(app.status)) {
      html += makeTableFromArray(app.status);
    }

    html += `</div>`;
  });

  container.innerHTML = html;
}


async function sendTransition() {
  if (!isConfigured()) return;

  const t = t_transition.value;

  if (!STATE.rc.allowed.includes(t)) {
    return alert("Transition not allowed in current RC state");
  }

  const res = await api(
    `/apps/${STATE.name}/versions/${STATE.version}/transitions`,
    'POST',
    { name: t }
  );

  fsm_output.textContent = JSON.stringify(res, null, 2);
}
	
async function sendCommand() {
  if (!isConfigured()) return;
  const res = await api(`/apps/${STATE.name}/versions/${STATE.version}/commands`, 'POST', {
    cmd: cmd_command.value,
    params: JSON.parse(cmd_params.value)
  });
  fsm_output.textContent = JSON.stringify(res, null, 2);
}

function openTab(id) {
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

async function sendCommandGlobal(cmd) {
  if (!isConfigured()) return;

  try {
    const res = await api(
      `/apps/${STATE.name}/versions/${STATE.version}/commands`,
      'POST',
      {
        cmd: cmd,
        params: {}
      }
    );

    console.log("Command:", cmd, res);

  } catch (e) {
    console.error("Command error", e);
  }
}

async function restartApp() {
  if (!isConfigured()) return;

  const res = await api(
    `/apps/${STATE.name}/versions/${STATE.version}/restart`,
    'POST',
    { params: {} }
  );

  versions_output.textContent = JSON.stringify(res, null, 2);
}
</script>

</body>
</html>
