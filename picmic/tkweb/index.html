<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicoMic DAQ Web Interface</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">🔬 PicoMic DAQ Control</span>
            <span class="navbar-text text-light" id="connection-status">
                <span class="badge bg-danger">Disconnected</span>
            </span>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <!-- Left Panel: Configuration -->
            <div class="col-lg-4">
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">🔧 Configuration</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="config-name" class="form-label">Config Name:</label>
                            <input type="text" class="form-control" id="config-name" placeholder="e.g. LIROC_TEST">
                        </div>
                        <div class="mb-3">
                            <label for="config-version" class="form-label">Version:</label>
                            <input type="number" class="form-control" id="config-version" value="1" min="0">
                        </div>
                        <button class="btn btn-primary w-100" id="btn-create-config">
                            Create Configuration
                        </button>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0">📊 Status</h5>
                    </div>
                    <div class="card-body">
                        <div id="status-info" class="status-display">
                            <p><strong>State:</strong> <span id="status-state">--</span></p>
                            <p><strong>Run:</strong> <span id="status-run">--</span></p>
                            <p><strong>Event:</strong> <span id="status-event">--</span></p>
                            <p><strong>Running:</strong> <span id="status-running" class="badge bg-danger">IDLE</span></p>
                        </div>
                        <button class="btn btn-info w-100 mt-2" id="btn-refresh-status">
                            Refresh Status
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Controls & Methods -->
            <div class="col-lg-8">
                <div class="card mb-4">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">⚙️ Methods</h5>
                    </div>
                    <div class="card-body">
                        <div id="methods-list" class="methods-container">
                            <p class="text-muted">Loading methods...</p>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header bg-warning text-dark">
                        <h5 class="mb-0">📝 Command Output</h5>
                    </div>
                    <div class="card-body">
                        <div id="output-log" class="log-display">
                            <p class="text-muted">Waiting for commands...</p>
                        </div>
                        <button class="btn btn-sm btn-secondary mt-2" id="btn-clear-log">
                            Clear Log
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for method execution -->
    <div class="modal fade" id="methodModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="methodModalTitle">Execute Method</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="methodModalBody">
                    <!-- Parameters will be dynamically inserted here -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="btn-execute-method">Execute</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
